  bio: |
    I am a Computer Science undergraduate at the [University of Pécs](https://international.pte.hu/) with interests in **Artificial Intelligence**, **Retrieval-Augmented Generation (RAG)**, **Computer Vision**, and **Cloud Computing**.

    I am currently working on RAG systems during a research internship at the [University of Cagliari](https://www.unica.it/it) and developing my BSc thesis project on **traffic and crowd monitoring using AI-based object detection**.

  supervisor: |
    My current research internship is hosted at the University of Cagliari, where I am working with RAG systems, FlashRAG, retrieval pipelines, Docker-based AI services, and experimental evaluation workflows.

  contact: |
